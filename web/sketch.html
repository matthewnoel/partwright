<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Partwright — SVG Sketch Tool</title>
<style>
  :root {
    --bg: #1e1f24;
    --panel: #2a2c33;
    --panel-2: #33363f;
    --border: #3d4049;
    --text: #e6e7ea;
    --text-dim: #9a9da6;
    --accent: #5b9dff;
    --accent-2: #4a8aee;
    --canvas-bg: #fbfbfd;
    --grid: #e2e4ea;
    --grid-major: #c9ccd6;
    --shape-fill: rgba(91, 157, 255, 0.18);
    --shape-stroke: #2f6fd4;
    --vertex: #2f6fd4;
    --vertex-first: #d4642f;
    --calib: #d4642f;
    --danger: #e0584e;
    --ok: #4caf7d;
    --select: #d4642f;
    --select-fill: rgba(212, 100, 47, 0.12);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 14px; background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 14px; font-weight: 600; margin: 0;
    letter-spacing: 0.3px;
  }
  header h1 .sub { color: var(--text-dim); font-weight: 400; }

  .toolbar {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .group {
    display: flex; align-items: center; gap: 6px;
    padding: 0 8px;
    border-right: 1px solid var(--border);
  }
  .group:last-child { border-right: none; }
  .group-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text-dim); margin-right: 2px;
  }

  button, select, input[type=text], input[type=number] {
    font-family: inherit; font-size: 12px;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 5px 9px; cursor: pointer;
  }
  button:hover:not(:disabled) { background: var(--border); }
  button:disabled { opacity: 0.4; cursor: default; }
  button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: var(--accent-2); }
  input[type=text], input[type=number] { cursor: text; width: 70px; }
  input[type=number] { width: 64px; }
  label.chk { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 12px; }
  input[type=checkbox] { cursor: pointer; }

  main { flex: 1; position: relative; overflow: hidden; background: var(--canvas-bg); }
  #canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
  #canvas.panning { cursor: grabbing; }
  #canvas.dragging { cursor: move; }

  footer {
    display: flex; align-items: center; gap: 16px;
    padding: 5px 14px; background: var(--panel);
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim);
    flex-wrap: wrap;
  }
  footer .status { color: var(--text); }
  footer .spacer { flex: 1; }
  .badge {
    padding: 2px 7px; border-radius: 4px; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge.quick { background: #3a4756; color: #9ec3ff; }
  .badge.precise { background: #4a3a2a; color: #ffc79e; }
  .badge.server { background: #2a4a38; color: #8fe0b3; }
  .badge.local { background: #4a3a2a; color: #ffc79e; }

  /* modal / dialog */
  .overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.55);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  .overlay.show { display: flex; }
  .dialog {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px 20px; min-width: 320px; max-width: 440px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .dialog h2 { margin: 0 0 10px; font-size: 14px; }
  .dialog p { margin: 6px 0; font-size: 12px; color: var(--text-dim); line-height: 1.5; }
  .dialog .row { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
  .dialog .row label { font-size: 12px; min-width: 90px; }
  .dialog .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
  .dialog input { width: 100%; }
  .dialog .row input { width: auto; flex: 1; }
  .file-list {
    max-height: 220px; overflow-y: auto; margin: 8px 0;
    border: 1px solid var(--border); border-radius: 5px;
  }
  .file-item {
    padding: 7px 10px; font-size: 12px; cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .file-item:last-child { border-bottom: none; }
  .file-item:hover { background: var(--panel-2); }
  .file-item.empty { color: var(--text-dim); cursor: default; }
  .toast {
    position: absolute; bottom: 44px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 16px; border-radius: 6px;
    font-size: 12px; z-index: 60; opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.err { border-color: var(--danger); }
  kbd {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 5px; font-size: 10px;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Print&nbsp;Lab <span class="sub">SVG Sketch</span></h1>
    <div class="toolbar">
      <div class="group">
        <span class="group-label">Tool</span>
        <button id="toolLasso" class="active" title="Polygon lasso">Lasso</button>
        <button id="toolRect" title="Rectangle — drag corner to corner">Rect</button>
        <button id="toolEllipse" title="Ellipse — drag a bounding box">Ellipse</button>
        <button id="toolLine" title="Line — click start then end, or drag">Line</button>
      </div>
      <div class="group">
        <span class="group-label">Mode</span>
        <button id="modeQuick" class="active">Quick</button>
        <button id="modePrecise">Precise</button>
      </div>
      <div class="group">
        <span class="group-label">Edit</span>
        <button id="undoBtn" title="Undo (Ctrl+Z)" disabled>Undo</button>
        <button id="redoBtn" title="Redo (Ctrl+Shift+Z)" disabled>Redo</button>
        <button id="clearBtn" title="Clear all">Clear</button>
      </div>
      <div class="group">
        <span class="group-label">Shape</span>
        <button id="deleteBtn" title="Delete selected shape (Del)" disabled>Delete</button>
        <button id="forwardBtn" title="Bring forward" disabled>Forward</button>
        <button id="backwardBtn" title="Send backward" disabled>Back</button>
      </div>
      <div class="group">
        <span class="group-label">Grid</span>
        <label class="chk"><input type="checkbox" id="snapChk"> Snap</label>
        <input type="number" id="gridSize" value="20" min="2" max="200" step="1" title="Grid spacing">
        <span id="gridUnit" style="font-size:11px;color:var(--text-dim)">px</span>
      </div>
      <div class="group">
        <span class="group-label">View</span>
        <button id="zoomInBtn" title="Zoom in">+</button>
        <button id="zoomOutBtn" title="Zoom out">&minus;</button>
        <button id="zoomFitBtn" title="Reset view">Fit</button>
      </div>
      <div class="group" id="preciseControls" style="display:none">
        <span class="group-label">Scale</span>
        <button id="calibBtn" title="Draw a calibration segment">Calibrate</button>
        <input type="number" id="scaleInput" value="1" min="0.0001" step="0.1" title="mm per pixel">
        <span style="font-size:11px;color:var(--text-dim)">mm/px</span>
      </div>
      <div class="group">
        <span class="group-label">File</span>
        <button id="openBtn">Open</button>
        <button id="saveBtn" class="primary">Save</button>
      </div>
    </div>
  </header>

  <main>
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="toast" id="toast"></div>

    <div class="overlay" id="overlay">
      <div class="dialog" id="dialogBox"></div>
    </div>
  </main>

  <footer>
    <span class="status" id="statusText">Click on the canvas to place polygon vertices.</span>
    <span class="spacer"></span>
    <span id="coordReadout"></span>
    <span class="badge" id="modeBadge">quick</span>
    <span class="badge" id="connBadge">local</span>
  </footer>
</div>

<input type="file" id="fileInput" accept=".svg,image/svg+xml" style="display:none">

<script>
"use strict";
(function () {

  // ----------------------------------------------------------------------
  // State
  // ----------------------------------------------------------------------
  var svg = document.getElementById("canvas");

  var state = {
    // Completed shapes (world/model coords, px units). Each is one of:
    //   { type:"polygon", points: [[x,y],...] }   — the Stage-1 lasso shape
    //   { type:"rect",    x, y, w, h }            — top-left + size (w,h >= 0)
    //   { type:"ellipse", cx, cy, rx, ry }
    //   { type:"line",    x1, y1, x2, y2 }
    // A legacy shape with no `type` field is treated as a polygon (back-compat).
    shapes: [],
    // In-progress polygon vertices (world coords) — lasso tool only
    draft: [],
    // View transform: world -> screen is  screen = world * zoom + pan
    zoom: 1,
    pan: { x: 0, y: 0 },
    // Interaction
    tool: "lasso",          // "lasso" | "rect" | "ellipse" | "line"
    mode: "quick",          // "quick" | "precise"
    snap: false,
    gridSize: 20,           // world px
    scale: 1,               // mm per world-px (precise mode)
    units: "mm",
    // index into state.shapes of the selected shape, or -1
    selected: -1,
    // calibration sub-mode
    calibrating: false,
    calibPoints: [],
    // undo/redo
    history: [],
    historyIndex: -1,
  };

  // transient pointer-driven flags
  var ui = {
    panning: false,
    panStart: null,         // {x,y} screen
    panOrigin: null,        // {x,y} world pan
    dragVertex: null,       // { shapeIdx, vertexIdx } or { draft:true, vertexIdx }
    dragHandle: null,       // { shapeIdx, handle } — resizing a primitive
    dragShape: null,        // { shapeIdx } — moving a whole primitive
    dragOrigin: null,       // snapshot of shape geometry at drag start
    dragStartWorld: null,   // [x,y] world point where a move drag began
    newShape: null,         // shape object being drawn by a click-drag tool
    lineStart: null,        // [x,y] first click of the two-click line tool
    mouseWorld: { x: 0, y: 0 },
    movedSinceDown: false,
    pointerDownAt: null,
  };

  var VERTEX_R = 5;          // screen px hit radius for vertices
  var CLOSE_R = 9;           // screen px radius to close polygon on first vertex

  // ----------------------------------------------------------------------
  // Server detection
  // ----------------------------------------------------------------------
  var isServed = (location.protocol === "http:" || location.protocol === "https:");

  // ----------------------------------------------------------------------
  // Coordinate transforms
  // ----------------------------------------------------------------------
  function worldToScreen(p) {
    return { x: p[0] * state.zoom + state.pan.x, y: p[1] * state.zoom + state.pan.y };
  }
  function screenToWorld(sx, sy) {
    return [(sx - state.pan.x) / state.zoom, (sy - state.pan.y) / state.zoom];
  }
  function eventToScreen(e) {
    var r = svg.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  function snapWorld(p) {
    if (!state.snap) return p;
    var g = state.gridSize;
    return [Math.round(p[0] / g) * g, Math.round(p[1] / g) * g];
  }

  // ----------------------------------------------------------------------
  // History (undo / redo)
  // ----------------------------------------------------------------------
  function snapshot() {
    return JSON.stringify({
      shapes: state.shapes,
      draft: state.draft,
      selected: state.selected,
    });
  }
  function pushHistory() {
    // drop any redo tail
    state.history = state.history.slice(0, state.historyIndex + 1);
    state.history.push(snapshot());
    state.historyIndex = state.history.length - 1;
    // cap history
    if (state.history.length > 200) {
      state.history.shift();
      state.historyIndex--;
    }
    updateButtons();
  }
  function restore(snap) {
    var obj = JSON.parse(snap);
    state.shapes = obj.shapes;
    state.draft = obj.draft;
    state.selected = (typeof obj.selected === "number") ? obj.selected : -1;
    if (state.selected >= state.shapes.length) state.selected = -1;
  }
  function undo() {
    if (state.historyIndex <= 0) return;
    state.historyIndex--;
    restore(state.history[state.historyIndex]);
    render();
    updateButtons();
    setStatus("Undo.");
  }
  function redo() {
    if (state.historyIndex >= state.history.length - 1) return;
    state.historyIndex++;
    restore(state.history[state.historyIndex]);
    render();
    updateButtons();
    setStatus("Redo.");
  }

  // ----------------------------------------------------------------------
  // Rendering
  // ----------------------------------------------------------------------
  var SVGNS = "http://www.w3.org/2000/svg";
  function el(name, attrs) {
    var n = document.createElementNS(SVGNS, name);
    if (attrs) for (var k in attrs) n.setAttribute(k, attrs[k]);
    return n;
  }

  // The type of a shape, tolerating legacy (pre-Stage-2) untyped polygons.
  function shapeType(shape) {
    return shape.type || "polygon";
  }

  function render() {
    while (svg.firstChild) svg.removeChild(svg.firstChild);

    var w = svg.clientWidth, h = svg.clientHeight;

    // --- grid ---
    if (state.snap) drawGrid(w, h);

    // --- completed shapes ---
    state.shapes.forEach(function (shape, si) {
      drawShape(shape, si);
    });

    // --- selection highlight + handles (drawn on top of all shapes) ---
    if (state.selected >= 0 && state.selected < state.shapes.length) {
      drawSelection(state.shapes[state.selected]);
    }

    // --- shape currently being drawn by a click-drag tool ---
    if (ui.newShape) {
      drawShape(ui.newShape, -1, true);
    }

    // --- two-click line tool: rubber-band from first click to cursor ---
    if (ui.lineStart) {
      var ls = worldToScreen(ui.lineStart);
      var lm = worldToScreen([ui.mouseWorld.x, ui.mouseWorld.y]);
      svg.appendChild(el("line", {
        x1: ls.x, y1: ls.y, x2: lm.x, y2: lm.y,
        stroke: "var(--accent)", "stroke-width": "2",
        "stroke-dasharray": "5 4", "stroke-linecap": "round",
      }));
      svg.appendChild(el("circle", {
        cx: ls.x, cy: ls.y, r: VERTEX_R,
        fill: "var(--vertex)", stroke: "#fff", "stroke-width": "1.5",
      }));
    }

    // --- in-progress draft polygon ---
    if (state.draft.length > 0) {
      var dpts = state.draft.map(function (p) {
        var s = worldToScreen(p);
        return s.x + "," + s.y;
      });
      // rubber-band to current mouse
      var mscreen = worldToScreen([ui.mouseWorld.x, ui.mouseWorld.y]);
      var live = dpts.concat([mscreen.x + "," + mscreen.y]);
      svg.appendChild(el("polyline", {
        points: live.join(" "),
        fill: "none",
        stroke: "var(--accent)",
        "stroke-width": "2",
        "stroke-dasharray": "5 4",
        "stroke-linejoin": "round",
      }));
      state.draft.forEach(function (p, vi) {
        var s = worldToScreen(p);
        var first = (vi === 0);
        var c = el("circle", {
          cx: s.x, cy: s.y, r: first ? CLOSE_R - 2 : VERTEX_R,
          fill: first ? "var(--vertex-first)" : "var(--vertex)",
          stroke: "#fff", "stroke-width": "1.5",
          "data-draft": "1", "data-vertex": vi, class: "vtx",
        });
        c.style.cursor = "move";
        svg.appendChild(c);
      });
    }

    // --- calibration overlay ---
    if (state.calibrating && state.calibPoints.length > 0) {
      var cpts = state.calibPoints.map(function (p) {
        var s = worldToScreen(p);
        return s.x + "," + s.y;
      });
      var cend = state.calibPoints.length === 1
        ? worldToScreen([ui.mouseWorld.x, ui.mouseWorld.y])
        : worldToScreen(state.calibPoints[1]);
      var endStr = state.calibPoints.length === 1
        ? cend.x + "," + cend.y
        : cpts[1];
      svg.appendChild(el("polyline", {
        points: cpts[0] + " " + endStr,
        fill: "none", stroke: "var(--calib)", "stroke-width": "2.5",
      }));
      state.calibPoints.forEach(function (p) {
        var s = worldToScreen(p);
        svg.appendChild(el("circle", {
          cx: s.x, cy: s.y, r: 5, fill: "var(--calib)",
          stroke: "#fff", "stroke-width": "1.5",
        }));
      });
    }
  }

  function drawGrid(w, h) {
    var g = state.gridSize * state.zoom;
    if (g < 4) return; // too dense to be useful
    var ox = state.pan.x % g;
    var oy = state.pan.y % g;
    // index of first line for major-line detection
    var firstX = Math.floor(-state.pan.x / g);
    var firstY = Math.floor(-state.pan.y / g);
    var i, x, y, idx;
    for (i = 0, x = ox; x < w; x++, i++) {
      x = ox + i * g;
      if (x > w) break;
      idx = firstX + i;
      var majorX = (idx % 5 === 0);
      svg.appendChild(el("line", {
        x1: x, y1: 0, x2: x, y2: h,
        stroke: majorX ? "var(--grid-major)" : "var(--grid)",
        "stroke-width": "1",
      }));
    }
    for (i = 0, y = oy; y < h; y++, i++) {
      y = oy + i * g;
      if (y > h) break;
      idx = firstY + i;
      var majorY = (idx % 5 === 0);
      svg.appendChild(el("line", {
        x1: 0, y1: y, x2: w, y2: y,
        stroke: majorY ? "var(--grid-major)" : "var(--grid)",
        "stroke-width": "1",
      }));
    }
  }

  // ----------------------------------------------------------------------
  // Per-shape rendering
  // ----------------------------------------------------------------------
  // Normalize a rect so w,h are non-negative (the user may drag any direction).
  function normRect(r) {
    var x = r.x, y = r.y, w = r.w, h = r.h;
    if (w < 0) { x += w; w = -w; }
    if (h < 0) { y += h; h = -h; }
    return { x: x, y: y, w: w, h: h };
  }

  // Format a world-px length as a label, in mm when in precise mode.
  function lenLabel(worldLen) {
    if (state.mode === "precise") {
      return (worldLen * state.scale).toFixed(1) + " " + state.units;
    }
    return Math.round(worldLen) + " px";
  }

  // Draw a small dimension caption at a screen point.
  function dimText(sx, sy, txt) {
    var t = el("text", {
      x: sx, y: sy,
      "font-size": "11", "font-family": "sans-serif",
      fill: "var(--shape-stroke)", "text-anchor": "middle",
      "paint-order": "stroke", stroke: "var(--canvas-bg)",
      "stroke-width": "3", "stroke-linejoin": "round",
    });
    t.textContent = txt;
    svg.appendChild(t);
  }

  // Draw one completed (or preview) shape. `preview` shapes are dashed and
  // carry no interaction handles.
  function drawShape(shape, si, preview) {
    var type = shapeType(shape);
    var stroke = preview ? "var(--accent)" : "var(--shape-stroke)";
    var common = {
      fill: type === "line" ? "none" : "var(--shape-fill)",
      stroke: stroke,
      "stroke-width": "2",
      "stroke-linejoin": "round",
    };
    if (preview) common["stroke-dasharray"] = "5 4";

    if (type === "polygon") {
      var pts = shape.points.map(function (p) {
        var s = worldToScreen(p);
        return s.x + "," + s.y;
      }).join(" ");
      svg.appendChild(el("polygon", Object.assign({ points: pts }, common)));
      // polygon vertices stay individually editable, exactly as in Stage 1
      if (!preview) {
        shape.points.forEach(function (p, vi) {
          var s = worldToScreen(p);
          var c = el("circle", {
            cx: s.x, cy: s.y, r: VERTEX_R,
            fill: "var(--vertex)", stroke: "#fff", "stroke-width": "1.5",
            "data-shape": si, "data-vertex": vi, class: "vtx",
          });
          c.style.cursor = "move";
          svg.appendChild(c);
        });
      }
    } else if (type === "rect") {
      var r = normRect(shape);
      var tl = worldToScreen([r.x, r.y]);
      svg.appendChild(el("rect", Object.assign({
        x: tl.x, y: tl.y,
        width: r.w * state.zoom, height: r.h * state.zoom,
      }, common)));
      if (state.mode === "precise" && !preview && r.w > 0 && r.h > 0) {
        dimText(tl.x + r.w * state.zoom / 2, tl.y - 6, lenLabel(r.w));
        var ry = el("text", {
          x: tl.x - 8, y: tl.y + r.h * state.zoom / 2,
          "font-size": "11", "font-family": "sans-serif",
          fill: "var(--shape-stroke)", "text-anchor": "middle",
          "paint-order": "stroke", stroke: "var(--canvas-bg)",
          "stroke-width": "3",
          transform: "rotate(-90 " + (tl.x - 8) + " " +
            (tl.y + r.h * state.zoom / 2) + ")",
        });
        ry.textContent = lenLabel(r.h);
        svg.appendChild(ry);
      }
    } else if (type === "ellipse") {
      var c0 = worldToScreen([shape.cx, shape.cy]);
      svg.appendChild(el("ellipse", Object.assign({
        cx: c0.x, cy: c0.y,
        rx: Math.abs(shape.rx) * state.zoom,
        ry: Math.abs(shape.ry) * state.zoom,
      }, common)));
      if (state.mode === "precise" && !preview &&
          Math.abs(shape.rx) > 0 && Math.abs(shape.ry) > 0) {
        var rx = Math.abs(shape.rx), ryy = Math.abs(shape.ry);
        if (Math.abs(rx - ryy) < 1e-6) {
          dimText(c0.x, c0.y - ryy * state.zoom - 6,
            "⌀ " + lenLabel(rx * 2));
        } else {
          dimText(c0.x, c0.y - ryy * state.zoom - 6, lenLabel(rx * 2));
        }
      }
    } else if (type === "line") {
      var a = worldToScreen([shape.x1, shape.y1]);
      var b = worldToScreen([shape.x2, shape.y2]);
      svg.appendChild(el("line", {
        x1: a.x, y1: a.y, x2: b.x, y2: b.y,
        stroke: stroke, "stroke-width": "2", "stroke-linecap": "round",
        "stroke-dasharray": preview ? "5 4" : "",
      }));
      if (state.mode === "precise" && !preview) {
        var dx = shape.x2 - shape.x1, dy = shape.y2 - shape.y1;
        var L = Math.sqrt(dx * dx + dy * dy);
        if (L > 0) {
          dimText((a.x + b.x) / 2, (a.y + b.y) / 2 - 8, lenLabel(L));
        }
      }
    }
  }

  // Resize handles for a primitive, in world coords, keyed by name.
  function shapeHandles(shape) {
    var type = shapeType(shape);
    if (type === "rect") {
      var r = normRect(shape);
      return {
        nw: [r.x, r.y], ne: [r.x + r.w, r.y],
        sw: [r.x, r.y + r.h], se: [r.x + r.w, r.y + r.h],
      };
    }
    if (type === "ellipse") {
      var rx = Math.abs(shape.rx), ry = Math.abs(shape.ry);
      return {
        nw: [shape.cx - rx, shape.cy - ry],
        ne: [shape.cx + rx, shape.cy - ry],
        sw: [shape.cx - rx, shape.cy + ry],
        se: [shape.cx + rx, shape.cy + ry],
      };
    }
    if (type === "line") {
      return { p1: [shape.x1, shape.y1], p2: [shape.x2, shape.y2] };
    }
    return {}; // polygons use per-vertex handles, drawn by drawShape
  }

  // Draw the selection highlight and interaction handles for a shape.
  function drawSelection(shape) {
    var type = shapeType(shape);
    // dashed bounding outline
    var bb = shapeBBox(shape);
    if (bb && type !== "polygon") {
      var tl = worldToScreen([bb.minX, bb.minY]);
      svg.appendChild(el("rect", {
        x: tl.x - 3, y: tl.y - 3,
        width: (bb.maxX - bb.minX) * state.zoom + 6,
        height: (bb.maxY - bb.minY) * state.zoom + 6,
        fill: "none", stroke: "var(--select)",
        "stroke-width": "1.5", "stroke-dasharray": "4 3",
      }));
    } else if (bb && type === "polygon") {
      var ptl = worldToScreen([bb.minX, bb.minY]);
      svg.appendChild(el("rect", {
        x: ptl.x - 4, y: ptl.y - 4,
        width: (bb.maxX - bb.minX) * state.zoom + 8,
        height: (bb.maxY - bb.minY) * state.zoom + 8,
        fill: "none", stroke: "var(--select)",
        "stroke-width": "1.5", "stroke-dasharray": "4 3",
      }));
    }
    // resize handles for primitives (polygons keep their own vertex dots)
    if (type !== "polygon") {
      var handles = shapeHandles(shape);
      for (var name in handles) {
        var s = worldToScreen(handles[name]);
        var hr = el("rect", {
          x: s.x - 4, y: s.y - 4, width: 8, height: 8,
          fill: "var(--select)", stroke: "#fff", "stroke-width": "1.5",
        });
        hr.style.cursor = "pointer";
        svg.appendChild(hr);
      }
    }
  }

  // ----------------------------------------------------------------------
  // Hit testing
  // ----------------------------------------------------------------------
  function hitVertex(screenPt) {
    // check draft first (drawn on top), then shapes
    var i;
    for (i = state.draft.length - 1; i >= 0; i--) {
      var s = worldToScreen(state.draft[i]);
      var r = (i === 0) ? CLOSE_R : VERTEX_R + 3;
      if (dist(s, screenPt) <= r) return { draft: true, vertexIdx: i };
    }
    for (var si = state.shapes.length - 1; si >= 0; si--) {
      if (shapeType(state.shapes[si]) !== "polygon") continue;
      var pts = state.shapes[si].points;
      for (var vi = pts.length - 1; vi >= 0; vi--) {
        var sp = worldToScreen(pts[vi]);
        if (dist(sp, screenPt) <= VERTEX_R + 3) {
          return { shapeIdx: si, vertexIdx: vi };
        }
      }
    }
    return null;
  }
  function dist(a, b) {
    var dx = a.x - b.x, dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // World-coordinate bounding box of one shape (null if it has no geometry).
  function shapeBBox(shape) {
    var type = shapeType(shape);
    if (type === "polygon") {
      if (!shape.points || shape.points.length === 0) return null;
      var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      shape.points.forEach(function (p) {
        if (p[0] < minX) minX = p[0];
        if (p[1] < minY) minY = p[1];
        if (p[0] > maxX) maxX = p[0];
        if (p[1] > maxY) maxY = p[1];
      });
      return { minX: minX, minY: minY, maxX: maxX, maxY: maxY };
    }
    if (type === "rect") {
      var r = normRect(shape);
      return { minX: r.x, minY: r.y, maxX: r.x + r.w, maxY: r.y + r.h };
    }
    if (type === "ellipse") {
      var rx = Math.abs(shape.rx), ry = Math.abs(shape.ry);
      return {
        minX: shape.cx - rx, minY: shape.cy - ry,
        maxX: shape.cx + rx, maxY: shape.cy + ry,
      };
    }
    if (type === "line") {
      return {
        minX: Math.min(shape.x1, shape.x2),
        minY: Math.min(shape.y1, shape.y2),
        maxX: Math.max(shape.x1, shape.x2),
        maxY: Math.max(shape.y1, shape.y2),
      };
    }
    return null;
  }

  // Distance (screen px) from screen point p to segment a-b (screen coords).
  function distToSegment(p, a, b) {
    var vx = b.x - a.x, vy = b.y - a.y;
    var wx = p.x - a.x, wy = p.y - a.y;
    var len2 = vx * vx + vy * vy;
    var t = len2 > 0 ? (wx * vx + wy * vy) / len2 : 0;
    t = Math.max(0, Math.min(1, t));
    var cx = a.x + t * vx, cy = a.y + t * vy;
    var dx = p.x - cx, dy = p.y - cy;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // Is screen point inside a polygon given as world points? (even-odd rule)
  function pointInPolygon(screenPt, worldPts) {
    var inside = false;
    var n = worldPts.length, j = n - 1;
    for (var i = 0; i < n; i++) {
      var pi = worldToScreen(worldPts[i]);
      var pj = worldToScreen(worldPts[j]);
      if (((pi.y > screenPt.y) !== (pj.y > screenPt.y)) &&
          (screenPt.x < (pj.x - pi.x) * (screenPt.y - pi.y) /
            (pj.y - pi.y) + pi.x)) {
        inside = !inside;
      }
      j = i;
    }
    return inside;
  }

  // Hit-test a shape body. Filled shapes hit on interior; lines on the stroke.
  function shapeHit(shape, screenPt) {
    var type = shapeType(shape);
    if (type === "polygon") {
      if (shape.points.length >= 3 &&
          pointInPolygon(screenPt, shape.points)) return true;
      // also hit on the outline so thin/concave polygons stay grabbable
      for (var i = 0; i < shape.points.length; i++) {
        var a = worldToScreen(shape.points[i]);
        var b = worldToScreen(shape.points[(i + 1) % shape.points.length]);
        if (distToSegment(screenPt, a, b) <= 5) return true;
      }
      return false;
    }
    if (type === "rect") {
      var r = normRect(shape);
      var tl = worldToScreen([r.x, r.y]);
      var br = worldToScreen([r.x + r.w, r.y + r.h]);
      return screenPt.x >= tl.x - 4 && screenPt.x <= br.x + 4 &&
             screenPt.y >= tl.y - 4 && screenPt.y <= br.y + 4;
    }
    if (type === "ellipse") {
      var c0 = worldToScreen([shape.cx, shape.cy]);
      var rx = Math.abs(shape.rx) * state.zoom + 4;
      var ry = Math.abs(shape.ry) * state.zoom + 4;
      if (rx <= 0 || ry <= 0) return false;
      var nx = (screenPt.x - c0.x) / rx, ny = (screenPt.y - c0.y) / ry;
      return nx * nx + ny * ny <= 1;
    }
    if (type === "line") {
      var p1 = worldToScreen([shape.x1, shape.y1]);
      var p2 = worldToScreen([shape.x2, shape.y2]);
      return distToSegment(screenPt, p1, p2) <= 6;
    }
    return false;
  }

  // Topmost shape under a screen point, or -1.
  function hitShape(screenPt) {
    for (var si = state.shapes.length - 1; si >= 0; si--) {
      if (shapeHit(state.shapes[si], screenPt)) return si;
    }
    return -1;
  }

  // If the selected shape is a primitive, return a grabbed resize handle.
  function hitHandle(screenPt) {
    if (state.selected < 0) return null;
    var shape = state.shapes[state.selected];
    if (shapeType(shape) === "polygon") return null;
    var handles = shapeHandles(shape);
    for (var name in handles) {
      var s = worldToScreen(handles[name]);
      if (dist(s, screenPt) <= 7) {
        return { shapeIdx: state.selected, handle: name };
      }
    }
    return null;
  }

  // ----------------------------------------------------------------------
  // Polygon drawing interaction
  // ----------------------------------------------------------------------
  function placeVertex(worldPt) {
    // closing: clicked near first vertex of an in-progress polygon
    if (state.draft.length >= 3) {
      var firstScreen = worldToScreen(state.draft[0]);
      var clickScreen = worldToScreen(worldPt);
      if (dist(firstScreen, clickScreen) <= CLOSE_R + 2) {
        closeDraft();
        return;
      }
    }
    state.draft.push([worldPt[0], worldPt[1]]);
    render();
    setStatus(state.draft.length + " vertex" + (state.draft.length === 1 ? "" : "es")
      + " placed. Click the first point or press Enter to close.");
  }

  function closeDraft() {
    if (state.draft.length < 3) {
      setStatus("Need at least 3 vertices to close a polygon.", true);
      return;
    }
    state.shapes.push({ type: "polygon", points: state.draft.slice() });
    state.draft = [];
    pushHistory();
    render();
    setStatus("Polygon closed. " + state.shapes.length + " shape(s) on canvas.");
  }

  function cancelDraft() {
    if (state.draft.length === 0) return;
    state.draft = [];
    render();
    setStatus("Polygon cancelled.");
  }

  // ----------------------------------------------------------------------
  // Tool switching & primitive creation (Stage 2)
  // ----------------------------------------------------------------------
  var TOOL_BTNS = {
    lasso: "toolLasso", rect: "toolRect",
    ellipse: "toolEllipse", line: "toolLine",
  };

  function setTool(tool) {
    if (!TOOL_BTNS[tool]) return;
    // leaving the lasso mid-draw abandons the in-progress polygon
    if (state.tool === "lasso" && tool !== "lasso") cancelDraft();
    state.tool = tool;
    ui.lineStart = null;
    ui.newShape = null;
    for (var t in TOOL_BTNS) {
      document.getElementById(TOOL_BTNS[t]).classList.toggle("active", t === tool);
    }
    svg.style.cursor = "crosshair";
    if (tool === "lasso") {
      setStatus("Lasso: click on the canvas to place polygon vertices.");
    } else if (tool === "rect") {
      setStatus("Rectangle: drag from one corner to the opposite corner.");
    } else if (tool === "ellipse") {
      setStatus("Ellipse: drag out a bounding box.");
    } else if (tool === "line") {
      setStatus("Line: click a start point then an end point, or drag.");
    }
    render();
  }

  // Build a new primitive of the active tool's type from a drag a->b (world).
  function makePrimitive(tool, a, b) {
    if (tool === "rect") {
      return { type: "rect", x: a[0], y: a[1], w: b[0] - a[0], h: b[1] - a[1] };
    }
    if (tool === "ellipse") {
      return {
        type: "ellipse",
        cx: (a[0] + b[0]) / 2, cy: (a[1] + b[1]) / 2,
        rx: Math.abs(b[0] - a[0]) / 2, ry: Math.abs(b[1] - a[1]) / 2,
      };
    }
    if (tool === "line") {
      return { type: "line", x1: a[0], y1: a[1], x2: b[0], y2: b[1] };
    }
    return null;
  }

  // Is a freshly drawn primitive big enough to keep?
  function primitiveValid(shape) {
    var type = shapeType(shape);
    if (type === "rect") {
      return Math.abs(shape.w) >= 1 && Math.abs(shape.h) >= 1;
    }
    if (type === "ellipse") {
      return Math.abs(shape.rx) >= 0.5 && Math.abs(shape.ry) >= 0.5;
    }
    if (type === "line") {
      var dx = shape.x2 - shape.x1, dy = shape.y2 - shape.y1;
      return Math.sqrt(dx * dx + dy * dy) >= 1;
    }
    return true;
  }

  // Commit a finished primitive: normalize, append, select it.
  function commitPrimitive(shape) {
    if (!primitiveValid(shape)) {
      setStatus("Shape too small — try again.", true);
      return;
    }
    if (shapeType(shape) === "rect") {
      var r = normRect(shape);
      shape.x = r.x; shape.y = r.y; shape.w = r.w; shape.h = r.h;
    }
    state.shapes.push(shape);
    state.selected = state.shapes.length - 1;
    pushHistory();
    render();
    setStatus(capitalize(shapeType(shape)) + " added. " +
      state.shapes.length + " shape(s) on canvas.");
  }

  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  // ----------------------------------------------------------------------
  // Selection, delete, z-order (Stage 2)
  // ----------------------------------------------------------------------
  function selectShape(idx) {
    state.selected = idx;
    updateButtons();
    render();
    if (idx >= 0) {
      setStatus(capitalize(shapeType(state.shapes[idx])) + " selected.");
    }
  }

  function clearSelection() {
    if (state.selected < 0) return;
    state.selected = -1;
    updateButtons();
    render();
  }

  function deleteSelected() {
    if (state.selected < 0 || state.selected >= state.shapes.length) return;
    var type = shapeType(state.shapes[state.selected]);
    state.shapes.splice(state.selected, 1);
    state.selected = -1;
    pushHistory();
    updateButtons();
    render();
    setStatus(capitalize(type) + " deleted.");
  }

  function bringForward() {
    var i = state.selected;
    if (i < 0 || i >= state.shapes.length - 1) return;
    var tmp = state.shapes[i];
    state.shapes[i] = state.shapes[i + 1];
    state.shapes[i + 1] = tmp;
    state.selected = i + 1;
    pushHistory();
    updateButtons();
    render();
    setStatus("Brought forward.");
  }

  function sendBackward() {
    var i = state.selected;
    if (i <= 0) return;
    var tmp = state.shapes[i];
    state.shapes[i] = state.shapes[i - 1];
    state.shapes[i - 1] = tmp;
    state.selected = i - 1;
    pushHistory();
    updateButtons();
    render();
    setStatus("Sent backward.");
  }

  // ----------------------------------------------------------------------
  // Move / resize a shape in place (Stage 2)
  // ----------------------------------------------------------------------
  // Translate a shape by (dx,dy) world units, writing into `target` from the
  // unmodified geometry snapshot `origin`.
  function translateShape(target, origin, dx, dy) {
    var type = shapeType(target);
    if (type === "polygon") {
      target.points = origin.points.map(function (p) {
        return [p[0] + dx, p[1] + dy];
      });
    } else if (type === "rect") {
      target.x = origin.x + dx; target.y = origin.y + dy;
    } else if (type === "ellipse") {
      target.cx = origin.cx + dx; target.cy = origin.cy + dy;
    } else if (type === "line") {
      target.x1 = origin.x1 + dx; target.y1 = origin.y1 + dy;
      target.x2 = origin.x2 + dx; target.y2 = origin.y2 + dy;
    }
  }

  // Resize a primitive by dragging one of its handles to world point `wp`.
  function resizeShape(target, origin, handle, wp) {
    var type = shapeType(target);
    if (type === "rect") {
      var r = normRect(origin);
      var x0 = r.x, y0 = r.y, x1 = r.x + r.w, y1 = r.y + r.h;
      if (handle === "nw") { x0 = wp[0]; y0 = wp[1]; }
      else if (handle === "ne") { x1 = wp[0]; y0 = wp[1]; }
      else if (handle === "sw") { x0 = wp[0]; y1 = wp[1]; }
      else if (handle === "se") { x1 = wp[0]; y1 = wp[1]; }
      target.x = x0; target.y = y0;
      target.w = x1 - x0; target.h = y1 - y0;
    } else if (type === "ellipse") {
      // the dragged corner moves; the opposite corner stays fixed
      var orx = Math.abs(origin.rx), ory = Math.abs(origin.ry);
      var corners = {
        nw: [origin.cx - orx, origin.cy - ory],
        ne: [origin.cx + orx, origin.cy - ory],
        sw: [origin.cx - orx, origin.cy + ory],
        se: [origin.cx + orx, origin.cy + ory],
      };
      var opp = { nw: "se", ne: "sw", sw: "ne", se: "nw" }[handle];
      var fixed = corners[opp];
      target.cx = (wp[0] + fixed[0]) / 2;
      target.cy = (wp[1] + fixed[1]) / 2;
      target.rx = Math.abs(wp[0] - fixed[0]) / 2;
      target.ry = Math.abs(wp[1] - fixed[1]) / 2;
    } else if (type === "line") {
      if (handle === "p1") { target.x1 = wp[0]; target.y1 = wp[1]; }
      else if (handle === "p2") { target.x2 = wp[0]; target.y2 = wp[1]; }
    }
  }

  // ----------------------------------------------------------------------
  // Calibration (precise mode)
  // ----------------------------------------------------------------------
  function startCalibration() {
    if (state.mode !== "precise") return;
    state.calibrating = true;
    state.calibPoints = [];
    cancelDraft();
    svg.style.cursor = "crosshair";
    setStatus("Calibration: click two points spanning a known length.");
  }
  function finishCalibration() {
    var a = state.calibPoints[0], b = state.calibPoints[1];
    var pxLen = Math.sqrt(Math.pow(b[0] - a[0], 2) + Math.pow(b[1] - a[1], 2));
    if (pxLen < 1) {
      setStatus("Calibration segment too short — try again.", true);
      state.calibrating = false;
      state.calibPoints = [];
      render();
      return;
    }
    showCalibDialog(pxLen);
  }

  // ----------------------------------------------------------------------
  // Pointer events
  // ----------------------------------------------------------------------
  svg.addEventListener("pointerdown", function (e) {
    svg.setPointerCapture(e.pointerId);
    var sp = eventToScreen(e);
    ui.movedSinceDown = false;
    ui.pointerDownAt = sp;

    // middle-button or space-pan or shift-drag: pan
    if (e.button === 1 || e.button === 2 || (e.button === 0 && e.shiftKey)) {
      ui.panning = true;
      ui.panStart = sp;
      ui.panOrigin = { x: state.pan.x, y: state.pan.y };
      svg.classList.add("panning");
      return;
    }

    if (e.button !== 0) return;

    var worldRaw = screenToWorld(sp.x, sp.y);

    // calibration mode
    if (state.calibrating) {
      var cp = snapWorld(worldRaw);
      state.calibPoints.push(cp);
      if (state.calibPoints.length === 2) {
        finishCalibration();
      } else {
        render();
      }
      return;
    }

    // 1) a resize handle on the currently selected primitive wins first
    var handle = hitHandle(sp);
    if (handle) {
      ui.dragHandle = handle;
      ui.dragOrigin = JSON.parse(JSON.stringify(state.shapes[handle.shapeIdx]));
      svg.classList.add("dragging");
      return;
    }

    // 2) a polygon vertex (Stage-1 editing) — only when not drawing a new shape
    if (state.tool === "lasso" || state.draft.length === 0) {
      var hit = hitVertex(sp);
      if (hit) {
        ui.dragVertex = hit;
        svg.classList.add("dragging");
        return;
      }
    }

    // 3) primitive-drawing tools: begin a corner-to-corner drag
    if (state.tool === "rect" || state.tool === "ellipse") {
      var startW = snapWorld(worldRaw);
      ui.newShape = makePrimitive(state.tool, startW, startW);
      ui.dragStartWorld = startW;
      return;
    }
    if (state.tool === "line") {
      var lw = snapWorld(worldRaw);
      if (ui.lineStart) {
        // second click of a two-click line — finished on pointerup if no drag
        ui.newShape = makePrimitive("line", ui.lineStart, lw);
      } else {
        ui.dragStartWorld = lw; // may become a drag-drawn line
      }
      return;
    }

    // 4) lasso tool with a shape under the cursor and nothing in progress:
    //    select it (and prepare to move it)
    if (state.tool === "lasso" && state.draft.length === 0) {
      var si = hitShape(sp);
      if (si >= 0) {
        if (state.selected !== si) selectShape(si);
        ui.dragShape = { shapeIdx: si };
        ui.dragOrigin = JSON.parse(JSON.stringify(state.shapes[si]));
        ui.dragStartWorld = worldRaw;
        svg.classList.add("dragging");
        return;
      }
    }

    // 5) nothing grabbed — placing a lasso vertex / clearing selection
    //    is resolved on pointerup if it wasn't a drag
    ui.dragVertex = null;
  });

  svg.addEventListener("pointermove", function (e) {
    var sp = eventToScreen(e);
    var worldRaw = screenToWorld(sp.x, sp.y);
    ui.mouseWorld = { x: worldRaw[0], y: worldRaw[1] };

    if (ui.pointerDownAt && dist(sp, ui.pointerDownAt) > 3) {
      ui.movedSinceDown = true;
    }

    updateCoordReadout(worldRaw);

    // panning
    if (ui.panning) {
      state.pan.x = ui.panOrigin.x + (sp.x - ui.panStart.x);
      state.pan.y = ui.panOrigin.y + (sp.y - ui.panStart.y);
      render();
      return;
    }

    // dragging a vertex
    if (ui.dragVertex) {
      var wp = snapWorld(worldRaw);
      if (ui.dragVertex.draft) {
        state.draft[ui.dragVertex.vertexIdx] = wp;
      } else {
        state.shapes[ui.dragVertex.shapeIdx].points[ui.dragVertex.vertexIdx] = wp;
      }
      render();
      return;
    }

    // resizing a primitive via a handle
    if (ui.dragHandle) {
      resizeShape(state.shapes[ui.dragHandle.shapeIdx], ui.dragOrigin,
        ui.dragHandle.handle, snapWorld(worldRaw));
      render();
      return;
    }

    // moving a whole selected shape
    if (ui.dragShape) {
      var dx = worldRaw[0] - ui.dragStartWorld[0];
      var dy = worldRaw[1] - ui.dragStartWorld[1];
      if (state.snap) {
        var g = state.gridSize;
        dx = Math.round(dx / g) * g;
        dy = Math.round(dy / g) * g;
      }
      translateShape(state.shapes[ui.dragShape.shapeIdx], ui.dragOrigin, dx, dy);
      render();
      return;
    }

    // drawing a new rect/ellipse by dragging
    if (ui.newShape && ui.dragStartWorld &&
        (state.tool === "rect" || state.tool === "ellipse")) {
      var ns = makePrimitive(state.tool, ui.dragStartWorld, snapWorld(worldRaw));
      ui.newShape = ns;
      render();
      return;
    }

    // drawing a line by dragging from the first press
    if (state.tool === "line" && ui.dragStartWorld && !ui.lineStart &&
        ui.movedSinceDown) {
      ui.newShape = makePrimitive("line", ui.dragStartWorld, snapWorld(worldRaw));
      render();
      return;
    }

    // two-click line: refine the end point if the second click is dragged
    if (state.tool === "line" && ui.lineStart && ui.newShape &&
        ui.movedSinceDown) {
      ui.newShape = makePrimitive("line", ui.lineStart, snapWorld(worldRaw));
      render();
      return;
    }

    // rubber band / line preview / calibration preview
    if (state.draft.length > 0 || ui.lineStart ||
        (state.calibrating && state.calibPoints.length === 1)) {
      render();
    }
  });

  svg.addEventListener("pointerup", function (e) {
    var sp = eventToScreen(e);
    if (svg.hasPointerCapture(e.pointerId)) svg.releasePointerCapture(e.pointerId);

    if (ui.panning) {
      ui.panning = false;
      svg.classList.remove("panning");
      ui.pointerDownAt = null;
      return;
    }

    if (e.button !== 0) { ui.pointerDownAt = null; return; }

    if (state.calibrating) { ui.pointerDownAt = null; return; }

    var worldRaw = screenToWorld(sp.x, sp.y);

    // releasing a primitive resize-handle drag
    if (ui.dragHandle) {
      var rs = state.shapes[ui.dragHandle.shapeIdx];
      if (shapeType(rs) === "rect") {
        var rn = normRect(rs);
        rs.x = rn.x; rs.y = rn.y; rs.w = rn.w; rs.h = rn.h;
      }
      if (ui.movedSinceDown) { pushHistory(); setStatus("Shape resized."); }
      ui.dragHandle = null;
      ui.dragOrigin = null;
      svg.classList.remove("dragging");
      ui.pointerDownAt = null;
      return;
    }

    // releasing a whole-shape move drag
    if (ui.dragShape) {
      if (ui.movedSinceDown) { pushHistory(); setStatus("Shape moved."); }
      ui.dragShape = null;
      ui.dragOrigin = null;
      ui.dragStartWorld = null;
      svg.classList.remove("dragging");
      ui.pointerDownAt = null;
      return;
    }

    // releasing a vertex drag
    if (ui.dragVertex) {
      if (ui.movedSinceDown) {
        pushHistory();
        setStatus("Vertex moved.");
      } else {
        // a click (no movement) on a vertex
        var dv = ui.dragVertex;
        if (dv.draft && dv.vertexIdx === 0 && state.draft.length >= 3) {
          closeDraft();
        }
        // click on existing-shape polygon vertex with no move: select its shape
        else if (!dv.draft) {
          selectShape(dv.shapeIdx);
        }
      }
      ui.dragVertex = null;
      svg.classList.remove("dragging");
      ui.pointerDownAt = null;
      return;
    }

    // finishing a rect/ellipse drag
    if (ui.newShape &&
        (state.tool === "rect" || state.tool === "ellipse")) {
      var finished = ui.newShape;
      ui.newShape = null;
      ui.dragStartWorld = null;
      commitPrimitive(finished);
      ui.pointerDownAt = null;
      return;
    }

    // line tool — resolve the two interaction styles
    if (state.tool === "line") {
      if (ui.newShape) {
        // either a completed drag-line, or the second click of a two-click line
        var fl = ui.newShape;
        ui.newShape = null;
        ui.lineStart = null;
        ui.dragStartWorld = null;
        commitPrimitive(fl);
      } else if (!ui.movedSinceDown) {
        // a plain click: first point of a two-click line
        ui.lineStart = snapWorld(worldRaw);
        ui.dragStartWorld = null;
        setStatus("Line: click the end point.");
        render();
      } else {
        ui.dragStartWorld = null;
      }
      ui.pointerDownAt = null;
      return;
    }

    // lasso tool: an empty-space click that wasn't a pan/drag
    if (state.tool === "lasso" && !ui.movedSinceDown) {
      if (state.draft.length > 0) {
        placeVertex(snapWorld(worldRaw));
      } else if (hitShape(sp) >= 0) {
        // clicked a shape body — select it
        selectShape(hitShape(sp));
      } else if (state.selected >= 0) {
        // clicked empty space — clear the selection
        clearSelection();
      } else {
        // empty canvas, nothing selected — begin a polygon
        placeVertex(snapWorld(worldRaw));
      }
    }
    ui.pointerDownAt = null;
  });

  // right-click on a vertex = delete it
  svg.addEventListener("contextmenu", function (e) {
    e.preventDefault();
    var sp = eventToScreen(e);
    var hit = hitVertex(sp);
    if (hit) deleteVertex(hit);
  });

  // double-click on a vertex = delete it (alternative to right-click)
  svg.addEventListener("dblclick", function (e) {
    var sp = eventToScreen(e);
    var hit = hitVertex(sp);
    if (hit) {
      e.preventDefault();
      e.stopPropagation();
      deleteVertex(hit);
    }
  });

  function deleteVertex(hit) {
    if (hit.draft) {
      state.draft.splice(hit.vertexIdx, 1);
      render();
      setStatus("Draft vertex deleted.");
      return;
    }
    var shape = state.shapes[hit.shapeIdx];
    if (shapeType(shape) !== "polygon") return; // primitives have no vertices
    if (shape.points.length <= 3) {
      // deleting would make a degenerate polygon: remove whole shape
      state.shapes.splice(hit.shapeIdx, 1);
      if (state.selected === hit.shapeIdx) state.selected = -1;
      else if (state.selected > hit.shapeIdx) state.selected--;
      setStatus("Shape removed (a polygon needs at least 3 vertices).");
    } else {
      shape.points.splice(hit.vertexIdx, 1);
      setStatus("Vertex deleted.");
    }
    pushHistory();
    updateButtons();
    render();
  }

  // ----------------------------------------------------------------------
  // Zoom (wheel)
  // ----------------------------------------------------------------------
  svg.addEventListener("wheel", function (e) {
    e.preventDefault();
    var sp = eventToScreen(e);
    var factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoomAt(sp, factor);
  }, { passive: false });

  function zoomAt(screenPt, factor) {
    var before = screenToWorld(screenPt.x, screenPt.y);
    state.zoom *= factor;
    state.zoom = Math.max(0.05, Math.min(40, state.zoom));
    // keep the world point under the cursor fixed
    state.pan.x = screenPt.x - before[0] * state.zoom;
    state.pan.y = screenPt.y - before[1] * state.zoom;
    render();
  }
  function zoomCenter(factor) {
    zoomAt({ x: svg.clientWidth / 2, y: svg.clientHeight / 2 }, factor);
  }
  function resetView() {
    state.zoom = 1;
    state.pan = { x: 0, y: 0 };
    render();
  }

  // ----------------------------------------------------------------------
  // Keyboard
  // ----------------------------------------------------------------------
  document.addEventListener("keydown", function (e) {
    var t = e.target;
    if (t && (t.tagName === "INPUT" || t.tagName === "SELECT" || t.tagName === "TEXTAREA")) {
      return; // don't hijack typing
    }
    if (e.key === "Enter") {
      if (state.draft.length >= 3) { closeDraft(); e.preventDefault(); }
    } else if (e.key === "Escape") {
      if (state.calibrating) {
        state.calibrating = false;
        state.calibPoints = [];
        render();
        setStatus("Calibration cancelled.");
      } else if (ui.lineStart || ui.newShape) {
        // abandon an in-progress primitive
        ui.lineStart = null;
        ui.newShape = null;
        ui.dragStartWorld = null;
        render();
        setStatus("Shape cancelled.");
      } else if (state.draft.length > 0) {
        cancelDraft();
      } else if (state.selected >= 0) {
        clearSelection();
        setStatus("Selection cleared.");
      }
      e.preventDefault();
    } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "z" && !e.shiftKey) {
      undo(); e.preventDefault();
    } else if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === "y" ||
               (e.key.toLowerCase() === "z" && e.shiftKey))) {
      redo(); e.preventDefault();
    } else if (e.key === "Delete" || e.key === "Backspace") {
      if (state.draft.length > 0) {
        // delete last placed draft vertex (Stage-1 behaviour)
        state.draft.pop();
        render();
        setStatus("Last vertex removed.");
        e.preventDefault();
      } else if (state.selected >= 0) {
        // delete the selected shape (Stage-2)
        deleteSelected();
        e.preventDefault();
      }
    } else if (e.key === "v" || e.key === "V") {
      setTool("lasso"); e.preventDefault();
    } else if (e.key === "r" || e.key === "R") {
      setTool("rect"); e.preventDefault();
    } else if (e.key === "o" || e.key === "O") {
      setTool("ellipse"); e.preventDefault();
    } else if (e.key === "l" || e.key === "L") {
      setTool("line"); e.preventDefault();
    }
  });

  // ----------------------------------------------------------------------
  // UI: status, coords, toast
  // ----------------------------------------------------------------------
  function setStatus(msg, isError) {
    var s = document.getElementById("statusText");
    s.textContent = msg;
    s.style.color = isError ? "var(--danger)" : "";
  }
  function updateCoordReadout(worldPt) {
    var r = document.getElementById("coordReadout");
    if (state.mode === "precise") {
      var mx = (worldPt[0] * state.scale).toFixed(2);
      var my = (worldPt[1] * state.scale).toFixed(2);
      r.textContent = mx + ", " + my + " " + state.units;
    } else {
      r.textContent = Math.round(worldPt[0]) + ", " + Math.round(worldPt[1]) + " px";
    }
  }
  var toastTimer = null;
  function toast(msg, isError) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.toggle("err", !!isError);
    t.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2600);
  }
  function updateButtons() {
    document.getElementById("undoBtn").disabled = state.historyIndex <= 0;
    document.getElementById("redoBtn").disabled =
      state.historyIndex >= state.history.length - 1;
    var hasSel = state.selected >= 0 && state.selected < state.shapes.length;
    document.getElementById("deleteBtn").disabled = !hasSel;
    document.getElementById("forwardBtn").disabled =
      !hasSel || state.selected >= state.shapes.length - 1;
    document.getElementById("backwardBtn").disabled =
      !hasSel || state.selected <= 0;
  }

  // ----------------------------------------------------------------------
  // Mode switching
  // ----------------------------------------------------------------------
  function setMode(mode) {
    state.mode = mode;
    document.getElementById("modeQuick").classList.toggle("active", mode === "quick");
    document.getElementById("modePrecise").classList.toggle("active", mode === "precise");
    document.getElementById("preciseControls").style.display =
      mode === "precise" ? "" : "none";
    var badge = document.getElementById("modeBadge");
    badge.textContent = mode;
    badge.className = "badge " + mode;
    document.getElementById("gridUnit").textContent =
      mode === "precise" ? "px" : "px";
    if (mode === "quick") {
      state.calibrating = false;
      state.calibPoints = [];
    }
    setStatus(mode === "precise"
      ? "Precise mode: set a scale by ratio or by drawing a calibration segment."
      : "Quick mode: freehand sketching, no scale.");
    render();
  }

  // ----------------------------------------------------------------------
  // Dialogs
  // ----------------------------------------------------------------------
  var overlay = document.getElementById("overlay");
  var dialogBox = document.getElementById("dialogBox");

  function openDialog(html) {
    dialogBox.innerHTML = html;
    overlay.classList.add("show");
  }
  function closeDialog() {
    overlay.classList.remove("show");
    dialogBox.innerHTML = "";
  }
  overlay.addEventListener("pointerdown", function (e) {
    if (e.target === overlay) closeDialog();
  });

  function showCalibDialog(pxLen) {
    openDialog(
      '<h2>Calibration segment</h2>' +
      '<p>The segment you drew is <strong>' + pxLen.toFixed(1) +
      ' px</strong> long. Enter its real-world length:</p>' +
      '<div class="row"><label>Real length</label>' +
      '<input type="number" id="calibLen" value="100" min="0.0001" step="1" autofocus>' +
      '<span>mm</span></div>' +
      '<div class="actions">' +
      '<button id="calibCancel">Cancel</button>' +
      '<button id="calibOk" class="primary">Set scale</button></div>'
    );
    var lenInput = document.getElementById("calibLen");
    lenInput.focus();
    lenInput.select();
    document.getElementById("calibCancel").onclick = function () {
      state.calibrating = false;
      state.calibPoints = [];
      render();
      closeDialog();
      setStatus("Calibration cancelled.");
    };
    function apply() {
      var real = parseFloat(lenInput.value);
      if (!(real > 0)) { lenInput.focus(); return; }
      state.scale = real / pxLen;
      document.getElementById("scaleInput").value =
        state.scale.toPrecision(6).replace(/\.?0+$/, "");
      state.calibrating = false;
      state.calibPoints = [];
      render();
      closeDialog();
      setStatus("Scale set: 1 px = " + state.scale.toPrecision(4) + " mm.");
      toast("Calibrated: " + state.scale.toPrecision(4) + " mm/px");
    }
    document.getElementById("calibOk").onclick = apply;
    lenInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") apply();
    });
  }

  function showOpenDialog() {
    if (isServed) {
      openDialog(
        '<h2>Open a saved sketch</h2>' +
        '<p>Sketches saved into the destination folder:</p>' +
        '<div class="file-list" id="fileList">' +
        '<div class="file-item empty">Loading&hellip;</div></div>' +
        '<p style="margin-top:12px">&hellip;or load a file from disk:</p>' +
        '<div class="actions">' +
        '<button id="openFromDisk">Choose file&hellip;</button>' +
        '<button id="openCancel">Close</button></div>'
      );
      document.getElementById("openCancel").onclick = closeDialog;
      document.getElementById("openFromDisk").onclick = function () {
        document.getElementById("fileInput").click();
      };
      fetchFileList();
    } else {
      // file:// — only disk loading is possible
      closeDialog();
      document.getElementById("fileInput").click();
    }
  }

  function fetchFileList() {
    fetch("/api/list")
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var list = document.getElementById("fileList");
        if (!list) return;
        var files = data.files || [];
        if (files.length === 0) {
          list.innerHTML = '<div class="file-item empty">No saved sketches yet.</div>';
          return;
        }
        list.innerHTML = "";
        files.forEach(function (name) {
          var item = document.createElement("div");
          item.className = "file-item";
          item.textContent = name;
          item.onclick = function () { loadFromServer(name); };
          list.appendChild(item);
        });
      })
      .catch(function () {
        var list = document.getElementById("fileList");
        if (list) list.innerHTML =
          '<div class="file-item empty">Could not reach the server.</div>';
      });
  }

  function loadFromServer(name) {
    fetch("/api/load?name=" + encodeURIComponent(name))
      .then(function (r) {
        if (!r.ok) throw new Error("load failed");
        return r.text();
      })
      .then(function (svgText) {
        importSvgText(svgText, name);
        closeDialog();
      })
      .catch(function () { toast("Could not load " + name, true); });
  }

  function showSaveDialog() {
    var defName = "sketch-" + tstamp() + ".svg";
    openDialog(
      '<h2>Save sketch</h2>' +
      '<div class="row"><label>File name</label>' +
      '<input type="text" id="saveName" value="' + defName + '"></div>' +
      '<p>' + (isServed
        ? 'Saves into the Partwright destination folder.'
        : 'Opened from file:// — this will download the SVG via the browser.') +
      '</p>' +
      '<div class="actions">' +
      '<button id="saveCancel">Cancel</button>' +
      '<button id="saveOk" class="primary">Save</button></div>'
    );
    var nameInput = document.getElementById("saveName");
    nameInput.focus();
    document.getElementById("saveCancel").onclick = closeDialog;
    function doSave() {
      var name = nameInput.value.trim();
      if (!name) { nameInput.focus(); return; }
      if (!/\.svg$/i.test(name)) name += ".svg";
      var svgText = buildSvgDocument();
      if (isServed) {
        saveToServer(name, svgText);
      } else {
        downloadSvg(name, svgText);
        toast("Downloaded " + name);
      }
      closeDialog();
    }
    document.getElementById("saveOk").onclick = doSave;
    nameInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") doSave();
    });
  }

  function saveToServer(name, svgText) {
    fetch("/api/save?name=" + encodeURIComponent(name), {
      method: "POST",
      headers: { "Content-Type": "image/svg+xml" },
      body: svgText,
    })
      .then(function (r) {
        if (!r.ok) throw new Error("save failed");
        return r.json();
      })
      .then(function (data) {
        toast("Saved to " + (data.path || name));
        setStatus("Saved: " + (data.path || name));
      })
      .catch(function () {
        toast("Save failed — falling back to download.", true);
        downloadSvg(name, svgText);
      });
  }

  function downloadSvg(name, svgText) {
    var blob = new Blob([svgText], { type: "image/svg+xml" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    setStatus("Downloaded: " + name);
  }

  function tstamp() {
    var d = new Date();
    function p(n) { return (n < 10 ? "0" : "") + n; }
    return d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) +
           "-" + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
  }

  // ----------------------------------------------------------------------
  // SVG export
  // ----------------------------------------------------------------------
  function geometryBounds() {
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    var any = false;
    function eat(bb) {
      if (!bb) return;
      any = true;
      if (bb.minX < minX) minX = bb.minX;
      if (bb.minY < minY) minY = bb.minY;
      if (bb.maxX > maxX) maxX = bb.maxX;
      if (bb.maxY > maxY) maxY = bb.maxY;
    }
    state.shapes.forEach(function (s) { eat(shapeBBox(s)); });
    if (state.draft.length > 0) {
      eat(shapeBBox({ type: "polygon", points: state.draft }));
    }
    if (!any) return { minX: 0, minY: 0, maxX: 100, maxY: 100 };
    return { minX: minX, minY: minY, maxX: maxX, maxY: maxY };
  }

  function buildSvgDocument() {
    var b = geometryBounds();
    var pad = 10;
    var minX = b.minX - pad, minY = b.minY - pad;
    var w = (b.maxX - b.minX) + 2 * pad;
    var h = (b.maxY - b.minY) + 2 * pad;
    if (w <= 0) w = 100;
    if (h <= 0) h = 100;

    var lines = [];
    lines.push('<?xml version="1.0" encoding="UTF-8"?>');
    var svgAttrs = 'xmlns="http://www.w3.org/2000/svg" ' +
      'xmlns:partwright="https://partwright.local/ns" ' +
      'viewBox="' + fmt(minX) + ' ' + fmt(minY) + ' ' + fmt(w) + ' ' + fmt(h) + '"';
    if (state.mode === "precise") {
      // express physical size: world px * scale = mm
      svgAttrs += ' width="' + fmt(w * state.scale) + state.units + '"' +
                  ' height="' + fmt(h * state.scale) + state.units + '"';
    } else {
      svgAttrs += ' width="' + fmt(w) + '" height="' + fmt(h) + '"';
    }
    lines.push('<svg ' + svgAttrs + '>');

    // metadata block — machine-readable, lets the editor round-trip the file
    lines.push('  <metadata>');
    lines.push('    <partwright:sketch');
    lines.push('        version="1"');
    lines.push('        mode="' + state.mode + '"');
    lines.push('        scale="' + state.scale + '"');
    lines.push('        units="' + state.units + '"');
    lines.push('        gridSize="' + state.gridSize + '"');
    lines.push('        snap="' + (state.snap ? "true" : "false") + '"');
    lines.push('        generator="Partwright sketch tool" />');
    lines.push('  </metadata>');

    // a faint title for human readers of the raw file
    lines.push('  <desc>Partwright reference sketch (' + state.mode + ' mode).</desc>');

    // shapes — each primitive exports as its native SVG element
    var sw = fmt(strokeWidth());
    state.shapes.forEach(function (shape, i) {
      var type = shapeType(shape);
      var base = 'partwright:role="sketch-shape" data-index="' + i + '" ' +
        'stroke="#1f6fd4" stroke-width="' + sw + '"';
      if (type === "polygon") {
        var pts = shape.points.map(function (p) {
          return fmt(p[0]) + "," + fmt(p[1]);
        }).join(" ");
        lines.push('  <polygon ' + base + ' points="' + pts + '" ' +
          'fill="none" stroke-linejoin="round" />');
      } else if (type === "rect") {
        var r = normRect(shape);
        lines.push('  <rect ' + base + ' x="' + fmt(r.x) + '" y="' + fmt(r.y) +
          '" width="' + fmt(r.w) + '" height="' + fmt(r.h) + '" fill="none" />');
      } else if (type === "ellipse") {
        var rx = Math.abs(shape.rx), ry = Math.abs(shape.ry);
        if (Math.abs(rx - ry) < 1e-9) {
          lines.push('  <circle ' + base + ' cx="' + fmt(shape.cx) +
            '" cy="' + fmt(shape.cy) + '" r="' + fmt(rx) + '" fill="none" />');
        } else {
          lines.push('  <ellipse ' + base + ' cx="' + fmt(shape.cx) +
            '" cy="' + fmt(shape.cy) + '" rx="' + fmt(rx) +
            '" ry="' + fmt(ry) + '" fill="none" />');
        }
      } else if (type === "line") {
        lines.push('  <line ' + base + ' x1="' + fmt(shape.x1) +
          '" y1="' + fmt(shape.y1) + '" x2="' + fmt(shape.x2) +
          '" y2="' + fmt(shape.y2) + '" stroke-linecap="round" />');
      }
    });

    lines.push('</svg>');
    return lines.join("\n") + "\n";
  }

  function strokeWidth() {
    // keep stroke ~1mm-ish in precise mode, fixed in quick mode
    if (state.mode === "precise" && state.scale > 0) {
      return Math.max(0.25, 1 / state.scale);
    }
    return 1.5;
  }

  function fmt(n) {
    // trim float noise
    return parseFloat(n.toFixed(4)).toString();
  }

  // ----------------------------------------------------------------------
  // SVG import (reopen)
  // ----------------------------------------------------------------------
  function importSvgText(text, sourceName) {
    var doc;
    try {
      doc = new DOMParser().parseFromString(text, "image/svg+xml");
    } catch (err) {
      toast("Could not parse SVG.", true);
      return;
    }
    var parserError = doc.querySelector("parsererror");
    if (parserError) {
      toast("That file is not valid SVG.", true);
      return;
    }
    var root = doc.documentElement;
    if (!root || root.nodeName.toLowerCase() !== "svg") {
      toast("Not an SVG file.", true);
      return;
    }

    // read Partwright metadata if present
    var meta = doc.getElementsByTagName("partwright:sketch")[0] ||
               doc.getElementsByTagNameNS("https://partwright.local/ns", "sketch")[0];
    var importedShapes = [];

    // Walk the document in order so a Stage-2 export keeps its z-order, and
    // mixed polygon + primitive drawings round-trip faithfully. Each drawable
    // element maps to one Stage-2 shape object.
    function num(elm, attr) {
      var v = parseFloat(elm.getAttribute(attr));
      return isNaN(v) ? 0 : v;
    }
    function walk(node) {
      for (var c = node.firstElementChild; c; c = c.nextElementSibling) {
        var tag = c.nodeName.toLowerCase();
        if (tag === "polygon") {
          var pp = parsePointsList(c.getAttribute("points") || "");
          if (pp.length >= 3) {
            importedShapes.push({ type: "polygon", points: pp });
          }
        } else if (tag === "polyline") {
          var lp = parsePointsList(c.getAttribute("points") || "");
          if (lp.length >= 3) {
            importedShapes.push({ type: "polygon", points: lp });
          } else if (lp.length === 2) {
            importedShapes.push({
              type: "line",
              x1: lp[0][0], y1: lp[0][1], x2: lp[1][0], y2: lp[1][1],
            });
          }
        } else if (tag === "path") {
          var poly = pathToPolygon(c.getAttribute("d") || "");
          if (poly && poly.length >= 3) {
            importedShapes.push({ type: "polygon", points: poly });
          } else if (poly && poly.length === 2) {
            importedShapes.push({
              type: "line",
              x1: poly[0][0], y1: poly[0][1], x2: poly[1][0], y2: poly[1][1],
            });
          }
        } else if (tag === "rect") {
          var rw = num(c, "width"), rh = num(c, "height");
          if (rw > 0 && rh > 0) {
            importedShapes.push({
              type: "rect", x: num(c, "x"), y: num(c, "y"), w: rw, h: rh,
            });
          }
        } else if (tag === "circle") {
          var cr = num(c, "r");
          if (cr > 0) {
            importedShapes.push({
              type: "ellipse",
              cx: num(c, "cx"), cy: num(c, "cy"), rx: cr, ry: cr,
            });
          }
        } else if (tag === "ellipse") {
          var erx = num(c, "rx"), ery = num(c, "ry");
          if (erx > 0 && ery > 0) {
            importedShapes.push({
              type: "ellipse",
              cx: num(c, "cx"), cy: num(c, "cy"), rx: erx, ry: ery,
            });
          }
        } else if (tag === "line") {
          importedShapes.push({
            type: "line",
            x1: num(c, "x1"), y1: num(c, "y1"),
            x2: num(c, "x2"), y2: num(c, "y2"),
          });
        } else if (tag === "g" || tag === "svg" || tag === "a") {
          // recurse into grouping containers
          walk(c);
        }
      }
    }
    walk(root);

    if (importedShapes.length === 0) {
      toast("No drawable geometry found in that SVG.", true);
      return;
    }

    // apply metadata
    if (meta) {
      var m = meta.getAttribute("mode");
      var sc = parseFloat(meta.getAttribute("scale"));
      var u = meta.getAttribute("units");
      var gs = parseFloat(meta.getAttribute("gridSize"));
      var sn = meta.getAttribute("snap");
      if (sc > 0) state.scale = sc;
      if (u) state.units = u;
      if (gs > 0) {
        state.gridSize = gs;
        document.getElementById("gridSize").value = gs;
      }
      if (sn === "true") {
        state.snap = true;
        document.getElementById("snapChk").checked = true;
      }
      document.getElementById("scaleInput").value = state.scale;
      setMode(m === "precise" ? "precise" : "quick");
    }

    state.shapes = importedShapes;
    state.draft = [];
    state.selected = -1;
    ui.lineStart = null;
    ui.newShape = null;
    pushHistory();
    updateButtons();
    fitToContent();
    render();
    var label = sourceName ? (" from " + sourceName) : "";
    setStatus("Loaded " + importedShapes.length + " shape(s)" + label + ".");
    toast("Opened" + label);
  }

  function parsePointsList(str) {
    var nums = str.trim().split(/[\s,]+/).map(parseFloat).filter(function (n) {
      return !isNaN(n);
    });
    var pts = [];
    for (var i = 0; i + 1 < nums.length; i += 2) {
      pts.push([nums[i], nums[i + 1]]);
    }
    return pts;
  }

  // Minimal path parser: handles M/L (absolute & relative) + Z. Enough to
  // round-trip our own exports and simple hand-made polygons.
  function pathToPolygon(d) {
    var tokens = d.match(/[MLZmlz]|-?\d*\.?\d+(?:e-?\d+)?/gi);
    if (!tokens) return null;
    var pts = [];
    var cmd = null, cur = [0, 0], i = 0;
    while (i < tokens.length) {
      var tk = tokens[i];
      if (/[MLZmlz]/.test(tk)) { cmd = tk; i++; continue; }
      var x = parseFloat(tk);
      if (cmd === "M" || cmd === "L") {
        var y = parseFloat(tokens[i + 1]);
        cur = [x, y];
        pts.push([cur[0], cur[1]]);
        i += 2;
        if (cmd === "M") cmd = "L";
      } else if (cmd === "m" || cmd === "l") {
        var dy = parseFloat(tokens[i + 1]);
        cur = [cur[0] + x, cur[1] + dy];
        pts.push([cur[0], cur[1]]);
        i += 2;
        if (cmd === "m") cmd = "l";
      } else {
        i++;
      }
    }
    return pts;
  }

  function fitToContent() {
    var b = geometryBounds();
    var pad = 40;
    var w = svg.clientWidth, h = svg.clientHeight;
    var gw = (b.maxX - b.minX) || 100;
    var gh = (b.maxY - b.minY) || 100;
    var z = Math.min((w - 2 * pad) / gw, (h - 2 * pad) / gh);
    z = Math.max(0.05, Math.min(40, z));
    state.zoom = z;
    state.pan.x = (w - (b.minX + b.maxX) * z) / 2;
    state.pan.y = (h - (b.minY + b.maxY) * z) / 2;
  }

  // ----------------------------------------------------------------------
  // Toolbar wiring
  // ----------------------------------------------------------------------
  document.getElementById("toolLasso").onclick = function () { setTool("lasso"); };
  document.getElementById("toolRect").onclick = function () { setTool("rect"); };
  document.getElementById("toolEllipse").onclick = function () { setTool("ellipse"); };
  document.getElementById("toolLine").onclick = function () { setTool("line"); };
  document.getElementById("deleteBtn").onclick = deleteSelected;
  document.getElementById("forwardBtn").onclick = bringForward;
  document.getElementById("backwardBtn").onclick = sendBackward;
  document.getElementById("modeQuick").onclick = function () { setMode("quick"); };
  document.getElementById("modePrecise").onclick = function () { setMode("precise"); };
  document.getElementById("undoBtn").onclick = undo;
  document.getElementById("redoBtn").onclick = redo;
  document.getElementById("clearBtn").onclick = function () {
    if (state.shapes.length === 0 && state.draft.length === 0) return;
    state.shapes = [];
    state.draft = [];
    state.selected = -1;
    ui.lineStart = null;
    ui.newShape = null;
    pushHistory();
    updateButtons();
    render();
    setStatus("Canvas cleared.");
  };
  document.getElementById("snapChk").onchange = function (e) {
    state.snap = e.target.checked;
    render();
    setStatus(state.snap ? "Snap grid on." : "Snap grid off.");
  };
  document.getElementById("gridSize").onchange = function (e) {
    var v = parseFloat(e.target.value);
    if (v > 0) { state.gridSize = v; render(); }
  };
  document.getElementById("zoomInBtn").onclick = function () { zoomCenter(1.25); };
  document.getElementById("zoomOutBtn").onclick = function () { zoomCenter(1 / 1.25); };
  document.getElementById("zoomFitBtn").onclick = function () {
    if (state.shapes.length > 0) { fitToContent(); render(); }
    else { resetView(); }
  };
  document.getElementById("calibBtn").onclick = startCalibration;
  document.getElementById("scaleInput").onchange = function (e) {
    var v = parseFloat(e.target.value);
    if (v > 0) {
      state.scale = v;
      setStatus("Scale set: 1 px = " + v + " mm.");
      render();
    }
  };
  document.getElementById("openBtn").onclick = showOpenDialog;
  document.getElementById("saveBtn").onclick = showSaveDialog;

  document.getElementById("fileInput").onchange = function (e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      importSvgText(String(reader.result), file.name);
    };
    reader.readAsText(file);
    e.target.value = ""; // allow re-selecting the same file
  };

  // ----------------------------------------------------------------------
  // Resize handling
  // ----------------------------------------------------------------------
  window.addEventListener("resize", render);

  // ----------------------------------------------------------------------
  // Init
  // ----------------------------------------------------------------------
  function init() {
    var connBadge = document.getElementById("connBadge");
    if (isServed) {
      connBadge.textContent = "server";
      connBadge.className = "badge server";
      connBadge.title = "Served by the Partwright local server — Save writes to the dest folder.";
    } else {
      connBadge.textContent = "file://";
      connBadge.className = "badge local";
      connBadge.title = "Opened directly — Save falls back to a browser download.";
    }
    setMode("quick");
    pushHistory(); // baseline empty state
    render();
  }
  init();

})();
</script>
</body>
</html>
